<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C2E0FF"/>
      <stop offset="100%" stop-color="#74B3F0"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B9FE8"/>
      <stop offset="100%" stop-color="#3D7FCC"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFB3CC"/>
      <stop offset="100%" stop-color="#FF4D88"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#3D7FCC" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- 裝飾圓點 -->
  <circle cx="68" cy="88" r="16" fill="white" opacity="0.2"/>
  <circle cx="444" cy="72" r="10" fill="white" opacity="0.16"/>
  <circle cx="455" cy="430" r="13" fill="white" opacity="0.14"/>
  <circle cx="58" cy="435" r="8" fill="white" opacity="0.16"/>
  <circle cx="78" cy="380" r="5" fill="white" opacity="0.2"/>
  <circle cx="430" cy="380" r="6" fill="white" opacity="0.18"/>

  <!-- 帳本陰影底 -->
  <rect x="118" y="112" width="276" height="320" rx="22" fill="#3D7FCC" opacity="0.15" transform="translate(6,8)"/>

  <!-- 帳本主體 -->
  <rect x="118" y="112" width="276" height="320" rx="22" fill="url(#book)" filter="url(#shadow)"/>

  <!-- 書脊 -->
  <rect x="118" y="112" width="52" height="320" rx="22" fill="url(#spine)"/>
  <rect x="148" y="112" width="22" height="320" fill="url(#spine)"/>

  <!-- 書脊裝飾線 -->
  <line x1="140" y1="160" x2="140" y2="390" stroke="white" stroke-width="2.5" opacity="0.3" stroke-dasharray="8,8"/>

  <!-- 頁面線條 -->
  <rect x="192" y="168" width="158" height="11" rx="5.5" fill="#D0E8FF"/>
  <rect x="192" y="196" width="126" height="9" rx="4.5" fill="#E4F0FF"/>
  <rect x="192" y="220" width="142" height="9" rx="4.5" fill="#E4F0FF"/>

  <!-- 分隔線 -->
  <rect x="182" y="248" width="178" height="2.5" rx="1.25" fill="#C8DDFF" opacity="0.8"/>

  <!-- 金額列 -->
  <rect x="192" y="266" width="80" height="9" rx="4.5" fill="#D0E8FF"/>
  <rect x="290" y="266" width="70" height="9" rx="4.5" fill="#FFD6E8"/>
  <rect x="192" y="290" width="60" height="9" rx="4.5" fill="#E4F0FF"/>
  <rect x="290" y="290" width="86" height="9" rx="4.5" fill="#E4F0FF"/>
  <rect x="192" y="314" width="72" height="9" rx="4.5" fill="#D0E8FF"/>
  <rect x="290" y="314" width="56" height="9" rx="4.5" fill="#FFD6E8"/>

  <!-- 底部合計線 -->
  <rect x="182" y="336" width="178" height="2.5" rx="1.25" fill="#C8DDFF" opacity="0.6"/>
  <rect x="192" y="352" width="100" height="11" rx="5.5" fill="#B8D4FF"/>
  <rect x="302" y="352" width="58" height="11" rx="5.5" fill="#FFB3CC"/>

  <!-- 大愛心 -->
  <path d="M256,398
    C256,398 210,366 210,336
    C210,318 222,308 234,308
    C243,308 251,313 256,320
    C261,313 269,308 278,308
    C290,308 302,318 302,336
    C302,366 256,398 256,398Z"
    fill="url(#heart)"/>
  <!-- 愛心高光 -->
  <ellipse cx="236" cy="325" rx="10" ry="7" fill="white" opacity="0.45" transform="rotate(-25,236,325)"/>

  <!-- 右上角小裝飾 -->
  <text x="364" y="158" font-size="30" fill="#FFD700" opacity="0.85" text-anchor="middle">★</text>
  <text x="160" y="420" font-size="20" fill="white" opacity="0.4" text-anchor="middle">✦</text>
</svg>
